name: agentdiff
description: CI for AI agent behavior changes

inputs:
  command:
    description: "Command to run. Supported now: classify, run, or demo."
    required: false
    default: classify
  base:
    description: "Base git ref for classify mode."
    required: false
  head:
    description: "Head git ref for classify mode."
    required: false
    default: HEAD
  files:
    description: "Comma-separated file list for classify mode. If set, base/head are ignored."
    required: false
  example:
    description: "Example name for run mode, such as coding-agent-harness."
    required: false
  recorded:
    description: "Use recorded traces for run mode."
    required: false
    default: "false"
  live:
    description: "Use live harness adapter for run mode."
    required: false
    default: "false"
  out:
    description: "Output directory for report.json and report.md."
    required: false
    default: .agentdiff/runs/latest
  github-token:
    description: "GitHub token used to create or update the sticky pull request comment."
    required: false

runs:
  using: node20
  main: packages/github-action/index.js
