name: release immutable tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Immutable version tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-immutable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must match vMAJOR.MINOR.PATCH, got: $VERSION" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "tag already exists: $VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

      - name: Stranger tests
        run: npm run stranger

      - name: Create immutable tag and move v0
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/$VERSION"
          git tag -f v0 "$GITHUB_SHA"
          git push origin refs/tags/v0 --force
